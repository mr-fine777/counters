<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Live Viewer Counter</title>
</head>
<body>
<span id="viewerCount">0</span> viewers

<script>
fetch("https://api.countapi.xyz/hit/rbxthreadlineee/live")
  .then(res => res.json())
  .then(data => {
    document.getElementById("viewerCount").innerText = data.value;
  });
</script>
</body>
</html>
